name: open-tia

# Open-TIA — Backend API only (Neo4j runs on Aura cloud)
# Requisitos: .env preenchido (ver .env.example)
# Iniciar: docker compose up -d --build
# Logs:    docker compose logs -f api

services:

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: open-tia-api:latest
    container_name: open-tia-api
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: "production"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
